services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobintel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobintel}
      POSTGRES_DB: ${POSTGRES_DB:-jobintel}
    ports:
      # Host 5433 to avoid clashing with a locally-installed Postgres on 5432.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobintel} -d ${POSTGRES_DB:-jobintel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: jobintel-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobintel}:${POSTGRES_PASSWORD:-jobintel}@db:5432/${POSTGRES_DB:-jobintel}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-20b:free}
      CANDIDATE_PROFILE_PATH: ${CANDIDATE_PROFILE_PATH:-evals/golden_set/candidate_profile.yaml}
      DEFAULT_RESUME_PATH: ${DEFAULT_RESUME_PATH:-evals/golden_set/resume.md}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RESUME_FIT_METHOD: ${RESUME_FIT_METHOD:-auto}
      TRACE_DIR: /app/logs/traces
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-hop-analyze}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./evals/golden_set:/app/evals/golden_set:ro
      - ./logs/traces:/app/logs/traces
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
