services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobintel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobintel}
      POSTGRES_DB: ${POSTGRES_DB:-jobintel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobintel} -d ${POSTGRES_DB:-jobintel}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
