# ---------------------------------------------------------------------------
# SENIORITY — desired career stage. Role nouns such as Product Manager are not
# management seniority by themselves; interpret the full title and duties.
# ---------------------------------------------------------------------------
seniority_policy:
  preferred_levels:
    - internship
    - entry level
    - new graduate
    - junior
    - early career
    - associate
  maximum_level: mid level
  maximum_years_required: 5
  conditional_exclusions: []
  hard_exclude_levels:
    - senior
    - sr
    - lead
    - leader
    - staff
    - principal
    - director
    - executive director
    - vice president
    - head
    - chief
    - distinguished
    - fellow
  ambiguous_title_tokens:
    - manager       # Product/Program/Relationship Manager may be a role, not people leadership.
    - officer       # Often a bank title; inspect duties and years required.

# ---------------------------------------------------------------------------
# TECHNICAL SCOPE — explicit capability boundaries shared by JobLens scoring
# and JobPush title classification. Do not use one keyword without context.
# ---------------------------------------------------------------------------
technical_scope:
  target_domains:
    - application software engineering
    - full stack, backend, or frontend engineering
    - data engineering
    - business or data analytics
    - product and technical program roles
    - solutions engineering and solution architecture
    - customer success and technical account roles
    - applied AI, LLM application, agent, and workflow integration
    - consulting
    - marketing
    - presale engineering and technical sales support
  hard_exclude_domains:
    - machine learning model development, training, infrastructure, or research
    - mechanical engineering
    - electrical engineering
    - CAD, EDA, circuit simulation, or chip-design methodology
    - embedded systems and firmware
    - RF, antenna, PHY, or radio engineering
    - analog, mixed-signal, circuit, ASIC, RTL, or physical design
    - CPU, GPU, SoC, silicon, semiconductor, or hardware architecture
    - manufacturing, enclosure, battery, touch, signal-integrity, or power-integrity engineering
    - data center facilities, data center technician, or data center operations roles
    - aerospace, aircraft, aviation, airplane, or engine maintenance roles
    - electronics technician, networking engineer, field service, maintenance, repair, or skilled-trade technician roles
    - store, retail floor, frontline customer service representative, supervisor, or employee benefits representative roles
    - mathematician or pure scientist titles outside applied business/data/product/software roles
    - pure scientific or algorithmic research
    - Java, C++, or C# software engineering as a only focus
  conditional_domains:
    - software tools, automation, validation, or data roles inside a hardware organization
    - systems integration or performance-modeling software
    - data scientist roles that focus on analytics rather than ML model development
  interpretation_notes:
    - AI application engineering can be target while ML model engineering and research are excluded.
    - Do not reject solely because a title contains SoC, CPU, GPU, or hardware; duties must still be software-focused.
    - Senior/Sr titles are non-target across all tracks for the current search.
    - Product Manager and Program Manager are role families; the word manager alone is not a seniority veto.

# ---------------------------------------------------------------------------
# language SCOPE — explicit capability boundaries shared by JobLens scoring
# and JobPush title classification. Do not use one keyword without context.
# ---------------------------------------------------------------------------
required_languages:
  allowed:
    - English
    - Chinese
    - Mandarin
  excluded_if_required:
    - Spanish
    - Japanese
    - Korean
    - German
    - French
    - Portuguese
# ---------------------------------------------------------------------------
# LEARNING — controls how manual examples become reusable rules.
# ---------------------------------------------------------------------------
learning_policy:
  manual_labels_override: true
  proposed_rules_require_approval: true
  minimum_examples_for_auto_rule: 20
  minimum_precision_for_auto_rule: 0.98
  review_cadence: weekly

employment_policy:
  contract_ok: true
  temporary_ok: true
  part_time_ok: true
  travel_heavy_ok: true

# All initial questions were resolved on 2026-06-23. Add new unresolved items
# here; entries are documentation-only until converted into structured fields.
open_questions: []

# ---------------------------------------------------------------------------
# LOCATIONS — tier lists are OPTIONAL; use summary for a vague overall stance.
# Fill summary alone, tiers alone, or both. Rough wording OK — not a rigid whitelist.
# ---------------------------------------------------------------------------
locations:
  summary: "US major metros OK; prefer public transport; open to remote"              # one loose sentence, e.g. "US major metros OK; prefer hybrid; open to remote"
  tier_1: [Chicago]        # optional — most want
  tier_2:                  # optional — acceptable
    - Texas
    - California
    - New York
    - major metros in Illinois
  tier_3:                  # optional — avoid / hard no
    - onsite-only in rural areas in the US
    - not in the US
  remote_ok: true

# ---------------------------------------------------------------------------
# DEALBREAKERS — hard no's for ANY job (can veto recommendation). Optional.
# PREFERENCES — nice-to-haves (only nudge, not veto). Optional.
# Write plain phrases; quotes only if you want.
# ---------------------------------------------------------------------------
dealbreakers:
  - unpaid internship
  - no visa sponsorship clearly stated in JD

preferences:
  - Python stack
  - SQL stack

# Company-specific preferences. Evaluate only from company evidence, never JD wording.
company_preferences:
  industries: [tech, AI software]
  stages: [VC-backed, pre-IPO]
  sizes: [at least 1,000 LinkedIn followers]
  funding_signals: [Y Combinator, a16z, institutional VC]
  network_signals: [Northwestern alumni, prestigious university alumni]
  avoid: [small local traditional-industry company, Chinese/Indian-background company]

# Domains you cannot do — JD mentions bump Role P-tier by +1 (editable list).
technical_penalties:
  - chip design
  - GPU hardware
  - HPC hardware
  - high-performance computing
  - HPC scheduler
  - algorithmic trading
  - silicon

# Match LinkedIn «X alumni work here» lines (from page you have open — not scraped).
alumni_schools:
  - Northwestern University
  - Northwestern University McCormick School of Engineering
  - Northwestern University School of Kellogg

# ---------------------------------------------------------------------------
# CONSTRAINTS
# needs_sponsorship: used ONLY when JD says "no sponsorship" (JD veto).
# H-1B database does NOT affect recommendation — see docs/SCORING_STANDARD.md
# ---------------------------------------------------------------------------
constraints:
  needs_sponsorship: true
