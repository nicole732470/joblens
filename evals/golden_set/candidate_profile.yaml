# Candidate Profile — your job-search INTENT (separate from the resume).
# Spec: docs/SCORING_STANDARD.md
#
# HOW TO WRITE LISTS (dealbreakers / preferences / example_titles):
#   - Each item on its own line with "  - " in front, OR
#   - One line in brackets: ["item one", "item two"]
#   - Use quotes when the text has commas or special chars; plain text is fine too.
#   - Rough / general wording is OK — the system interprets meaning, not exact words.
#
# Lines starting with # are comments (ignored).

# ---------------------------------------------------------------------------
# TRACKS — role CATEGORIES you want. priority: 1 = strongest, 3 = lowest configured.
# Same number = same tier. Add as many tracks as you need.
# ---------------------------------------------------------------------------
tracks:
  - id: pm_eng
    label: "product roles"
    priority: 1
    example_titles:
      - Technical Product Manager
      - Product Owner
      - Product Manager
      - System Engineer
      - Solution Architect
      - Solution Engineer
      - Solutions Engineer
      - Product Engineer

  - id: ai_eng
    label: "AI Engineer"
    priority: 2
    example_titles:
      - AI Engineer
      - AI Developer
      - Forward Deployed Engineer
      - AI Builder
      - Agentic AI Engineer

  - id: customer_success
    label: "Customer Success / technical account"
    priority: 3
    example_titles:
      - Customer Success Manager
      - Technical Customer Success Manager
      - CSM

  - id: sde_eng
    label: "SDE roles"
    priority: 3
    example_titles:
      - Software Engineer
      - Full Stack Engineer
      - Backend Engineer
      - Frontend Engineer
      - DevOps Engineer
      - Cloud Engineer
      - Data Engineer
      - Machine Learning Engineer

  - id: business_analyst
    label: "Analyst role"
    priority: 3
    example_titles:
      - Data Analyst
      - Business Analyst
      - Consultant


  # Copy this block for more tracks:
  # - id: <short_english_id>
  #   label: "<how you call this category>"
  #   priority: 2
  #   example_titles: ["Title A", "Title B"]

# ---------------------------------------------------------------------------
# AVOID TRACKS — role types you do NOT want (negative examples / anti-patterns).
# If a job clearly matches one, it is an explicit avoid and may force Skip.
# Same flexible matching as tracks — rough descriptions work.
# ---------------------------------------------------------------------------
avoid_tracks:
  - id: pure_sales
    label: "sales"
    example_titles:
      - Sales Representative

  - id: pure_eng
    label: "traditional engineering"
    example_titles:
      - Mechanical Engineer
      - Civil Engineer
      - Electrical Engineer

  - id: research_eng
    label: "Research Engineer"
    example_titles:
      - Applied Research Engineer
      - Research Engineer
      - Scientist
  # - id: <short_id>
  #   label: "<category you never want>"
  #   example_titles: ["..."]

# ---------------------------------------------------------------------------
# LOCATIONS — tier lists are OPTIONAL; use summary for a vague overall stance.
# Fill summary alone, tiers alone, or both. Rough wording OK — not a rigid whitelist.
# ---------------------------------------------------------------------------
locations:
  summary: "US major metros OK; prefer public transport; open to remote"              # one loose sentence, e.g. "US major metros OK; prefer hybrid; open to remote"
  tier_1: [Chicago]        # optional — most want
  tier_2:                  # optional — acceptable
    - Texas
    - California
    - New York
    - major metros in Illinois
  tier_3:                  # optional — avoid / hard no
    - onsite-only in rural areas in the US
    - not in the US
  remote_ok: true

# ---------------------------------------------------------------------------
# DEALBREAKERS — hard no's for ANY job (can veto recommendation). Optional.
# PREFERENCES — nice-to-haves (only nudge, not veto). Optional.
# Write plain phrases; quotes only if you want.
# ---------------------------------------------------------------------------
dealbreakers:
  - unpaid internship
  - no visa sponsorship clearly stated in JD

preferences:
  - Python stack

# Company-specific preferences. Evaluate only from company evidence, never JD wording.
company_preferences:
  industries: [tech, AI software]
  stages: [VC-backed, pre-IPO]
  sizes: [at least 1,000 LinkedIn followers]
  funding_signals: [Y Combinator, a16z, institutional VC]
  network_signals: [Northwestern alumni, prestigious university alumni]
  avoid: [small local traditional-industry company, Chinese/Indian-background company]

# Domains you cannot do — JD mentions bump Role P-tier by +1 (editable list).
technical_penalties:
  - chip design
  - GPU hardware
  - HPC hardware
  - high-performance computing
  - HPC scheduler
  - algorithmic trading
  - silicon

# Match LinkedIn «X alumni work here» lines (from page you have open — not scraped).
alumni_schools:
  - Northwestern University
  - Northwestern University McCormick School of Engineering
  - Northwestern University School of Kellogg

# ---------------------------------------------------------------------------
# CONSTRAINTS
# needs_sponsorship: used ONLY when JD says "no sponsorship" (JD veto).
# H-1B database does NOT affect recommendation — see docs/SCORING_STANDARD.md
# ---------------------------------------------------------------------------
constraints:
  needs_sponsorship: true
